name: Cypress Tests - Daily 9 AM

on:
  schedule:
    # Jalankan setiap hari jam 9.30 pagi WIB (UTC+7)
    # Waktu UTC: 9.30 pagi WIB = 2.30 pagi UTC
    - cron: '30 2 * * *'
  
  # Jalankan manual dari GitHub Actions tab
  workflow_dispatch:

jobs:
  cypress-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run Cypress tests
        run: pnpm exec cypress run
      
      - name: Upload Cypress videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
      
      - name: Upload Cypress screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
      
      - name: Send notification (Success)
        if: success()
        run: echo "✅ All tests passed at $(date)"
      
      - name: Send notification (Failure)
        if: failure()
        run: echo "❌ Tests failed at $(date)"
